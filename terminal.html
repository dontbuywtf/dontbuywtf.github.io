<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$DONTBUY_SYSTEM</title>
    <style>
        :root { --green: #afdd9f; --bg: #050505; --dim-green: rgba(175, 221, 159, 0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: var(--green); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; height: 100vh; display: flex; justify-content: center;
            overflow: hidden;
        }
        #container {
            width: 100%; max-width: 900px; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            position: relative;
        }
        /* Scanline Overlay */
        #container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 10; background-size: 100% 3px; pointer-events: none;
        }
        #terminal { 
            flex: 1; overflow-y: auto; padding: 25px;
            font-size: 16px; line-height: 1.6;
            scrollbar-width: none;
        }
        #terminal::-webkit-scrollbar { display: none; }
        #input-area { 
            background: #080808; padding: 15px 25px;
            display: flex; border-top: 1px solid #151515;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        #prompt { font-weight: bold; margin-right: 12px; color: var(--green); white-space: nowrap; }
        input { 
            background: transparent; border: none; color: var(--green); 
            outline: none; font-family: inherit; font-size: 16px; flex: 1;
        }
        .cmd-line { color: var(--dim-green); margin-bottom: 5px; }
        .success { color: #55ff55; text-shadow: 0 0 8px #55ff55; }
        .error { color: #ff5555; }
    </style>
</head>
<body>
    <div id="container">
        <div id="terminal"></div>
        <div id="input-area">
            <span id="prompt">root></span>
            <input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false" autocapitalize="none">
        </div>
    </div>
    <script src="terminal-core.js"></script>
</body>
</html>
