<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$DONTBUY_TERMINAL_UNIVERSAL</title>
    <style>
        :root { --green: #afdd9f; --bg: #000000; --crt-glow: rgba(175, 221, 159, 0.1); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #0a0a0a; /* Darker outer background for desktop contrast */
            color: var(--green); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; /* Centers the terminal on desktop */
            overflow: hidden;
        }

        /* The Main Container */
        #container {
            width: 100%;
            max-width: 800px; /* Limits width on desktop for better readability */
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* CRT Scanline Overlay */
        #container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        #terminal { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            font-size: 16px; /* Slightly larger for all devices */
            line-height: 1.5;
            scrollbar-width: thin;
            scrollbar-color: #222 var(--bg);
        }

        /* Scrollbar styling for Chrome/Safari */
        #terminal::-webkit-scrollbar { width: 6px; }
        #terminal::-webkit-scrollbar-track { background: var(--bg); }
        #terminal::-webkit-scrollbar-thumb { background: #222; }

        #input-area { 
            background: #0a0a0a; 
            padding: 15px 20px;
            display: flex; 
            align-items: center;
            border-top: 1px solid #1a1a1a;
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
        }

        #prompt { font-weight: bold; margin-right: 10px; color: var(--green); white-space: nowrap; }
        
        input { 
            background: transparent; border: none; color: var(--green); 
            outline: none; font-family: inherit; font-size: 16px; 
            flex: 1; caret-color: var(--green);
            width: 100%;
        }

        .error { color: #ff5f5f; }
        .success { color: #55ff55; text-shadow: 0 0 10px var(--green); }
        .dir { color: #5fbfff; }
        
        .flicker { animation: pulse 6s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.93; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flicker">
    <div id="container">
        <div id="terminal">
            <div>*** $DONTBUY SYSTEM INTERFACE [UNIVERSE_v2.0] ***</div>
            <div>STATION: REMOTE_ACCESS_NODE_01</div>
            <div>STATUS: ONLINE. TYPE 'HELP' TO PROCEED.</div>
            <br>
        </div>
        <div id="input-area">
            <span id="prompt">root></span>
            <input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false" autocapitalize="none">
        </div>
    </div>

    <script>
        const output = document.getElementById('terminal');
        const input = document.getElementById('cmd');
        const promptSpan = document.getElementById('prompt');

        let currentDir = 'root';
        const fileSystem = {
            'root': { dirs: ['logs', 'vault'], files: { 'manifesto.txt': "THE VOID IS THE ONLY TRUTH." } },
            'logs': { dirs: [], files: { 'entry_01.log': "2026-03-16: SNAPSHOT TAKEN." } },
            'vault': { dirs: [], files: { 'cipher.enc': "ENCRYPTED DATA DETECTED." } }
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim();
                if (!val) return;
                
                const [cmd, ...args] = val.split(' ');
                const arg = args.join(' ');

                printLine(`${promptSpan.textContent} ${val}`);
                handleCommand(cmd.toLowerCase(), arg);
                
                input.value = '';
                output.scrollTop = output.scrollHeight;
            }
        });

        function printLine(text, cls = "") {
            const div = document.createElement('div');
            div.textContent = text;
            if (cls) div.className = cls;
            output.appendChild(div);
        }

        function handleCommand(cmd, arg) {
            const fs = fileSystem[currentDir];

            switch(cmd) {
                case 'help':
                    printLine("COMMANDS: LS, CD [folder], CAT [file], DECRYPT [pass], CLEAR");
                    break;
                case 'ls':
                    let items = fs.dirs.map(d => `[${d}]`).concat(Object.keys(fs.files));
                    printLine(items.length ? items.join('  ') : "Empty directory.");
                    break;
                case 'cd':
                    if (arg === '..') currentDir = 'root';
                    else if (fs.dirs.includes(arg)) currentDir = arg;
                    else printLine("ERROR: DIRECTORY NOT FOUND", "error");
                    promptSpan.textContent = `${currentDir}>`;
                    break;
                case 'cat':
                    if (fs.files[arg]) printLine(fs.files[arg]);
                    else printLine("ERROR: FILE NOT FOUND", "error");
                    break;
                case 'decrypt':
                    if (arg === '333') printLine("DECODED: VOID-777-ALPHA (SUBMIT TO PROTON)", "success");
                    else printLine("DECRYPTION FAILED: INCORRECT KEY", "error");
                    break;
                case 'clear':
                    output.innerHTML = '';
                    break;
                default:
                    printLine("COMMAND NOT RECOGNIZED", "error");
            }
        }

        // Tap/Click anywhere to focus input
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
