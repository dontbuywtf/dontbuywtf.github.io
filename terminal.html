<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$DONTBUY_SYSTEM_TERMINAL</title>
    <style>
        :root { --green: #afdd9f; --bg: #050505; --dim-green: rgba(175, 221, 159, 0.6); }
        * { box-sizing: border-box; }
        body { 
            background: #000; color: var(--green); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; height: 100vh; display: flex; justify-content: center;
            overflow: hidden;
        }
        #container {
            width: 100%; max-width: 900px; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            position: relative; box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        #terminal { 
            flex: 1; overflow-y: auto; padding: 25px;
            font-size: 16px; line-height: 1.6;
            scrollbar-width: none;
        }
        #terminal::-webkit-scrollbar { display: none; }
        #input-area { 
            background: #080808; padding: 15px 25px;
            display: flex; border-top: 1px solid #151515;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        #prompt { font-weight: bold; margin-right: 12px; color: var(--green); }
        input { 
            background: transparent; border: none; color: var(--green); 
            outline: none; font-family: inherit; font-size: 16px; flex: 1;
        }
        .cmd-line { color: var(--dim-green); margin-bottom: 5px; }
        .success { color: #55ff55; text-shadow: 0 0 8px #55ff55; }
        .error { color: #ff5555; }
        .help-grid { display: grid; grid-template-columns: 120px 1fr; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="container">
        <div id="terminal" role="log" aria-live="polite"></div>
        <div id="input-area">
            <span id="prompt">root></span>
            <input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false" autocapitalize="none">
        </div>
    </div>

    <script>
        const output = document.getElementById('terminal');
        const input = document.getElementById('cmd');
        const promptSpan = document.getElementById('prompt');

        let currentDir = 'root';
        let isPrinting = false;

        const fileSystem = {
            'root': { dirs: ['logs', 'vault'], files: { 'manifesto.txt': "THE VOID IS THE ONLY PERMANENT RECORD." } },
            'logs': { dirs: [], files: { 'session_01.log': "2026-03-16: ACCESS GRANTED TO NODE_333." } },
            'vault': { dirs: [], files: { 'signal.enc': "ENCRYPTED FREQUENCY. PASSWORD REQUIRED." } }
        };

        // --- THE "REAL TERMINAL" PRINTING LOGIC ---
        async function printLines(lines) {
            isPrinting = true;
            input.disabled = true; // Block input while printing
            
            for (let line of lines) {
                const div = document.createElement('div');
                if (line.cls) div.className = line.cls;
                output.appendChild(div);
                
                // Typewriter effect for each line
                for (let char of line.text) {
                    div.textContent += char;
                    await new Promise(r => setTimeout(r, 15)); // Speed of typing
                }
                output.scrollTop = output.scrollHeight;
                await new Promise(r => setTimeout(r, 100)); // Gap between lines
            }
            
            isPrinting = false;
            input.disabled = false;
            input.focus();
        }

        const helpData = [
            { cmd: "LS", desc: "List all items in the current directory." },
            { cmd: "CD [DIR]", desc: "Change directory (Use 'CD ..' to go back)." },
            { cmd: "CAT [FILE]", desc: "Read the contents of a specific file." },
            { cmd: "DECRYPT", desc: "Attempt to unlock encrypted files." },
            { cmd: "CLEAR", desc: "Purge the current terminal session." },
            { cmd: "EXIT", desc: "Terminate remote connection." }
        ];

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && !isPrinting) {
                const val = input.value.trim();
                if (!val) return;
                
                const [cmd, ...args] = val.split(' ');
                const arg = args.join(' ');

                // Add the command to history immediately
                const historyLine = document.createElement('div');
                historyLine.className = 'cmd-line';
                historyLine.textContent = `${promptSpan.textContent} ${val}`;
                output.appendChild(historyLine);
                
                input.value = '';
                await handleCommand(cmd.toLowerCase(), arg);
            }
        });

        async function handleCommand(cmd, arg) {
            const fs = fileSystem[currentDir];

            switch(cmd) {
                case 'help':
                    let helpLines = [{text: "AVAILABLE COMMANDS:", cls: "success"}];
                    helpData.forEach(item => {
                        helpLines.push({text: `  ${item.cmd.padEnd(10)} - ${item.desc}`});
                    });
                    await printLines(helpLines);
                    break;

                case 'ls':
                    let items = fs.dirs.map(d => `[${d.toUpperCase()}]`).concat(Object.keys(fs.files));
                    await printLines([{text: items.length ? items.join('   ') : "Directory is empty."}]);
                    break;

                case 'cd':
                    if (arg === '..') {
                        currentDir = 'root';
                        promptSpan.textContent = `root>`;
                        await printLines([{text: "Directory changed to root."}]);
                    } else if (fs.dirs.includes(arg)) {
                        currentDir = arg;
                        promptSpan.textContent = `${currentDir}>`;
                        await printLines([{text: `Directory changed to ${arg}.`}]);
                    } else {
                        await printLines([{text: "ERROR: DIRECTORY NOT FOUND", cls: "error"}]);
                    }
                    break;

                case 'cat':
                    if (fs.files[arg]) await printLines([{text: fs.files[arg]}]);
                    else await printLines([{text: "ERROR: FILE NOT FOUND", cls: "error"}]);
                    break;

                case 'decrypt':
                    if (arg === '333') {
                        await printLines([
                            {text: "ACCESS GRANTED.", cls: "success"},
                            {text: "SIGNAL FOUND: VOID-777-ALPHA"},
                            {text: "SUBMIT TO: dontbuythis@proton.me"}
                        ]);
                    } else {
                        await printLines([{text: "DECRYPTION FAILED. INVALID KEY.", cls: "error"}]);
                    }
                    break;

                case 'clear':
                    output.innerHTML = '';
                    break;

                default:
                    await printLines([{text: "UNKNOWN COMMAND. TYPE 'HELP' FOR SYSTEM ASSISTANCE.", cls: "error"}]);
            }
        }

        // Initial boot sequence
        window.onload = () => {
            printLines([
                {text: "*** $DONTBUY SYSTEM BOOT v2.0.4 ***", cls: "success"},
                {text: "ESTABLISHING SECURE CONNECTION..."},
                {text: "NODE: REMOTE_TERMINAL_01"},
                {text: "STATUS: ENCRYPTED ACCESS GRANTED."},
                {text: " "}
            ]);
        };

        document.addEventListener('click', () => { if(!isPrinting) input.focus(); });
    </script>
</body>
</html>
