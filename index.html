<div id="countdown" style="font-family: monospace; font-size: 2.2rem; font-weight: bold; text-align: center; margin: 0; margin-top: 5rem; color: #333;">
  <span id="days">0</span>d 
  <span id="hours">00</span>h 
  <span id="minutes">00</span>m 
  <span id="seconds">00</span>s
</div>

<!-- JavaScript countdown logic -->
<script>
 
  const targetDate = new Date("2026-03-17T10:29:23Z").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    // If countdown finished
    if (distance < 0) {
      document.getElementById("days").textContent    = "0";
      document.getElementById("hours").textContent   = "00";
      document.getElementById("minutes").textContent = "00";
      document.getElementById("seconds").textContent = "00";
      // Optional: show a message
      document.getElementById("countdown").innerHTML = `
    <p style="margin-top: 3rem;">
    <a href="https://xrp.cafe/collection/dontbuy-sytem-logs" 
       target="_blank"
       style="display: inline-block; min-width:300px; padding: 1rem 2rem; background: #000000; color: #ffffff; font-family: monospace; font-size: 1.4rem; text-decoration: none; border: 2px solid #000000; transition: all 0.2s;">
      DON'T MINT
    </a>
  </p>
  `;
      return;
    }

    // Calculate days, hours, min, sec
    const days    = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours   = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    // Update the numbers (add leading zero for h/m/s)
    document.getElementById("days").textContent    = days;
    document.getElementById("hours").textContent   = hours.toString().padStart(2, "0");
    document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
    document.getElementById("seconds").textContent = seconds.toString().padStart(2, "0");
  }

  // Run immediately + every second
  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
